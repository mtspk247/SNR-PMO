name: CI (enforced gate)
# Enforced type + lint gate. npm ci now works (package-lock.json committed).
# tsc/lint failures fail the check. next.config still ignores build errors at
# deploy time until the first enforced run is confirmed green (then flip those).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
        continue-on-error: false
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npx next lint
        continue-on-error: false
