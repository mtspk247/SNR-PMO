name: E2E (smoke)
# Public-route smoke against the LIVE prod site after each deploy + daily + on demand.
# NON-BLOCKING: not a required status check (a flaky smoke must never block a merge).
#
# NOTE: pre-merge e2e against the PR's Vercel PREVIEW is a deliberate follow-up, NOT
# done here — preview deployments are gated by Vercel Deployment Protection (requests
# hit a "Log in to Vercel" wall), so headless testing needs a Protection-Bypass-for-
# Automation secret. Enable that in Vercel + add the CI secret to flip this to per-PR.
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright (isolated)
        run: |
          set -e
          mkdir -p /tmp/pw && cd /tmp/pw
          npm init -y >/dev/null 2>&1
          npm i -D @playwright/test@1.48.2 >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Run smoke (prod)
        env:
          BASE_URL: https://snr-pmo.vercel.app
        run: |
          set -e
          cd /tmp/pw
          cp "$GITHUB_WORKSPACE/playwright.config.ts" .
          cp -r "$GITHUB_WORKSPACE/e2e" .
          echo "Smoke target: $BASE_URL"
          npx playwright test
